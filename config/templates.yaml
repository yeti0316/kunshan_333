# ============================================================
# 多源项目信息提取器 — 项目类型模板配置
# 每个模板定义了一类项目需要提取的字段
# 必填字段缺失时会触发 Agent 继续搜索
# 选填字段尽量提取，没有也不报错
# ============================================================

模板列表:

  - 类型: 管网检测修复
    别名: [管网检测, 管道检测修复]
    必填:
      - 项目名称
      - 开始时间
      - 完成时间
      - 合同金额
      - 检测道路
    选填:
      - 雨水管长度(米)
      - 污水管长度(米)
      - 检测方法
      - 施工单位
      - 甲方单位
    常见文件: [中标通知书, 合同, 检测报告, 验收报告]

  - 类型: 管网新建
    别名: [管道新建, 管网建设工程]
    必填:
      - 项目名称
      - 开始时间
      - 完成时间
      - 合同金额
      - 建设道路
    选填:
      - 新建雨水管长度(米)
      - 新建污水管长度(米)
      - 施工单位
      - 监理单位
    常见文件: [中标通知书, 合同, 施工图, 竣工验收报告]

  - 类型: 农村污水整治
    别名: [农污治理, 农村生活污水]
    必填:
      - 项目名称
      - 开始时间
      - 完成时间
      - 合同金额
      - 整治村庄
    选填:
      - 户数
      - 管网总长度(米)
      - 处理规模(吨/日)
      - 处理站名称
    常见文件: [中标通知书, 合同, 设计方案, 验收报告, 资金拨付证明]

  - 类型: 小散乱整治
    别名: [小散乱治理, 散乱污整治]
    必填:
      - 项目名称
      - 开始时间
      - 完成时间
      - 合同金额
      - 整治范围
    选填:
      - 涉及商户数
      - 整治内容描述
      - 验收情况
    常见文件: [中标通知书, 合同, 整治清单, 验收报告]

  - 类型: 市政道路管网配套
    别名: [道路管网配套]
    必填:
      - 项目名称
      - 开始时间
      - 完成时间
      - 合同金额
      - 道路名称
    选填:
      - 道路长度(米)
      - 配套雨水管长度(米)
      - 配套污水管长度(米)
      - 施工单位
    常见文件: [中标通知书, 合同, 施工图, 竣工验收报告]

  - 类型: 排水户整治
    别名: [排水户治理]
    必填:
      - 项目名称
      - 开始时间
      - 完成时间
      - 合同金额
      - 整治户数
    选填:
      - 整治范围
      - 验收情况
      - 施工单位
    常见文件: [中标通知书, 合同, 整治台账, 验收报告]

  - 类型: 水质监测
    别名: [水质检测, 水质分析]
    必填:
      - 项目名称
      - 开始时间
      - 完成时间
      - 合同金额
      - 监测点位
    选填:
      - 监测频次
      - 监测指标
      - 检测单位
    常见文件: [中标通知书, 合同, 监测方案, 检测报告]

  - 类型: 工业企业雨污分流
    别名: [工业企业雨污分流, 雨污分流]
    必填:
      - 企业名称
      - 企业地址
      - 年份
      - 整治类型
    选填:
      - 排水许可证编号
      - 所属区镇
    常见文件: [排水许可证, 验收报告]
    整治规则:
      - "年份取排水许可证年份（X年到Y年取X）或整治完成年份"
      - "整治类型看文档内容：只有生活污水→雨污分流；生活+工业→工业废水接纳；只有工业→废水接纳"
      - "公司名称中的「工业」不算，看实际整治内容"

  - 类型: 工业企业废水接纳整治
    别名: [工业企业废水接纳, 废水接纳]
    必填:
      - 企业名称
      - 企业地址
      - 年份
      - 整治类型
    选填:
      - 排水许可证编号
      - 所属区镇
    常见文件: [排水许可证, 验收报告]
    整治规则:
      - "年份取排水许可证年份（X年到Y年取X）或整治完成年份"
      - "整治类型看文档内容：只有工业废水→废水接纳；生活+工业→工业废水接纳"
      - "公司名称中的「工业」不算，看实际整治内容"
